name: Build Releases

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller --noconfirm --onedir --windowed --icon "assets/icon.png" --name "Telegram Channel Downloader" "main_flet.py"

    - name: Build with PyInstaller (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        pyinstaller --noconfirm --onedir --windowed --name "Telegram Channel Downloader" "main_flet.py"

    - name: Zip Windows Release
      if: matrix.os == 'windows-latest'
      run: Compress-Archive -Path "dist/Telegram Channel Downloader" -DestinationPath "Telegram_Channel_Downloader_Windows.zip"

    - name: Tar Linux Release
      if: matrix.os == 'ubuntu-latest'
      run: tar -czf Telegram_Channel_Downloader_Linux.tar.gz -C dist "Telegram Channel Downloader"

    - name: Upload Release Assets
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          Telegram_Channel_Downloader_Windows.zip
          Telegram_Channel_Downloader_Linux.tar.gz
